name: PR staging → main

on:
  push:
    branches:
      - staging

jobs:
  open-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name:  PR de staging a main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head staging \
            --title "chore: promote staging → main" \
            --body "PR automático generado al mergear a \`staging\`." \
          || echo "PR ya existe o no hay cambios nuevos"